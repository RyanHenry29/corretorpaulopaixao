<section class="form-section" id="contato">
  <div>
    <div class="section-eyebrow">
      <div class="section-eyebrow-line"></div>
      <span>Agende sua visita</span>
    </div>
    <h2 class="section-title">Agende sua visita</h2>
    <div class="section-ornament"></div>
    <p class="form-right-text">
      Preencha seus dados e escolha o melhor horário para conhecer o Residencial Maro
    </p>
  </div>
  <div class="form-wrap">
    <div class="form-step-header">
      <div class="form-step-num">1</div>
      <div class="form-step-title">Dados pessoais</div>
    </div>
    <div class="form-group">
      <label>Nome completo *</label>
      <input type="text" id="f-nome" placeholder="Seu nome completo">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>CPF</label>
        <input type="text" id="f-cpf" placeholder="000.000.000-00">
      </div>
      <div class="form-group">
        <label>Telefone (WhatsApp) *</label>
        <input type="tel" id="f-tel" placeholder="(11) 9 0000-0000">
      </div>
    </div>
    <div class="form-group">
      <label>E-mail *</label>
      <input type="email" id="f-email" placeholder="seu@email.com">
    </div>

    <div class="form-step-divider"></div>
    <div class="form-step-header">
      <div class="form-step-num">2</div>
      <div class="form-step-title">Situação profissional</div>
    </div>
    <div class="form-group">
      <label>Tipo de trabalho</label>
      <div class="form-radio-group" id="f-trabalho">
        <label class="form-radio">
          <input type="radio" name="trabalho" value="CLT">
          <span>CLT</span>
        </label>
        <label class="form-radio">
          <input type="radio" name="trabalho" value="Autônomo">
          <span>Autônomo</span>
        </label>
        <label class="form-radio">
          <input type="radio" name="trabalho" value="Informal">
          <span>Informal</span>
        </label>
      </div>
    </div>
    <div class="form-group">
      <label>Renda mensal</label>
      <div class="form-radio-group" id="f-renda">
        <label class="form-radio">
          <input type="radio" name="renda" value="Até R$2.000">
          <span>Até R$2.000</span>
        </label>
        <label class="form-radio">
          <input type="radio" name="renda" value="R$2.000 a R$4.000">
          <span>R$2.000 a R$4.000</span>
        </label>
        <label class="form-radio">
          <input type="radio" name="renda" value="Acima de R$4.000">
          <span>Acima de R$4.000</span>
        </label>
      </div>
    </div>

    <div class="form-step-divider"></div>
    <div class="form-step-header">
      <div class="form-step-num">3</div>
      <div class="form-step-title">Dados financeiros</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Possui conta na Caixa?</label>
        <div class="form-radio-group form-radio-inline" id="f-caixa">
          <label class="form-radio">
            <input type="radio" name="caixa" value="Sim">
            <span>Sim</span>
          </label>
          <label class="form-radio">
            <input type="radio" name="caixa" value="Não">
            <span>Não</span>
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>Já conhece o MCMV?</label>
        <div class="form-radio-group form-radio-inline" id="f-conhece">
          <label class="form-radio">
            <input type="radio" name="conhece" value="Sim">
            <span>Sim</span>
          </label>
          <label class="form-radio">
            <input type="radio" name="conhece" value="Não">
            <span>Não</span>
          </label>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Já possui imóvel financiado?</label>
        <div class="form-radio-group form-radio-inline" id="f-imovel">
          <label class="form-radio">
            <input type="radio" name="imovel" value="Sim">
            <span>Sim</span>
          </label>
          <label class="form-radio">
            <input type="radio" name="imovel" value="Não">
            <span>Não</span>
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>Possui FGTS?</label>
        <div class="form-radio-group form-radio-inline" id="f-fgts">
          <label class="form-radio">
            <input type="radio" name="fgts" value="Sim">
            <span>Sim</span>
          </label>
          <label class="form-radio">
            <input type="radio" name="fgts" value="Não">
            <span>Não</span>
          </label>
        </div>
      </div>
    </div>

    <div class="form-step-divider"></div>
    <div class="form-step-header">
      <div class="form-step-num">4</div>
      <div class="form-step-title">Escolha data e horário</div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Data da visita</label>
        <input type="date" id="f-data">
      </div>
      <div class="form-group">
        <label>Horário</label>
        <select id="f-horario">
          <option value="" disabled selected>Selecione</option>
          <option>09:00</option>
          <option>10:30</option>
          <option>14:00</option>
          <option>16:00</option>
        </select>
      </div>
    </div>

    <button class="form-submit" id="form-btn">
      Agendar visita agora
    </button>
  </div>
</section>
